# Machine-specific data for chezmoi templates.
# Templates access this via: {{- $m := index .machines .chezmoi.hostname }}
# All machines must be explicitly listed — no default fallback.

# =============================================================================
# xeome-desktop — Desktop, dual monitor (HDMI-A-1 1440p@75 + DP-3 1080p@144)
# =============================================================================
[machines.xeome-desktop]
wm                 = "hyprland"
profile            = "xeome-desktop"
terminal           = "ghostty"
secondary_monitor  = "DP-3"
numlock            = true
natural_scroll     = false
is_laptop          = false
has_steelseries    = true
discord_cmd        = "equibop --ozone-platform-hint=wayland --enable-features=WaylandWindowDecorations --enable-features=AcceleratedVideoDecodeLinuxGL --enable-features=AcceleratedVideoEncoder --enable-features=VaapiIgnoreDriverChecks --enable-features=CanvasOopRasterization --enable-gpu-rasterization --enable-zero-copy --enable-features=WebRTCPipeWireCapturer"

[[machines.xeome-desktop.monitors]]
output   = "HDMI-A-1"
mode     = "2560x1440@75"
position = "0x0"
scale    = 1

[[machines.xeome-desktop.monitors]]
output   = "DP-3"
mode     = "1920x1080@144"
position = "2560x360"
scale    = 1

[[machines.xeome-desktop.workspaces]]
workspace = "1"
monitor   = "HDMI-A-1"

[[machines.xeome-desktop.workspaces]]
workspace = "2"
monitor   = "DP-3"

[[machines.xeome-desktop.workspaces]]
workspace = "3"
monitor   = "DP-3"

[[machines.xeome-desktop.workspaces]]
workspace = "4"
monitor   = "HDMI-A-1"

[[machines.xeome-desktop.workspaces]]
workspace = "5"
monitor   = "DP-3"

[[machines.xeome-desktop.workspaces]]
workspace = "6"
monitor   = "DP-3"

[[machines.xeome-desktop.workspaces]]
workspace = "7"
monitor   = "DP-3"

[[machines.xeome-desktop.workspaces]]
workspace = "8"
monitor   = "DP-3"

[[machines.xeome-desktop.workspaces]]
workspace = "9"
monitor   = "DP-3"

# =============================================================================
# emin-ultrabook — Ultrabook, external 4K@60 (DP-3) + internal 1200p (eDP-1)
# =============================================================================
[machines.emin-ultrabook]
wm                 = "hyprland"
profile            = "emin-ultrabook"
terminal           = "ghostty"
secondary_monitor  = "eDP-1"
numlock            = true
natural_scroll     = false
is_laptop          = true
has_steelseries    = false
discord_cmd        = "equibop --ozone-platform-hint=wayland --enable-features=WaylandWindowDecorations --enable-features=AcceleratedVideoDecodeLinuxGL --enable-features=AcceleratedVideoEncoder --enable-features=VaapiIgnoreDriverChecks --enable-features=CanvasOopRasterization --enable-gpu-rasterization --enable-zero-copy --enable-features=WebRTCPipeWireCapturer"

[[machines.emin-ultrabook.monitors]]
