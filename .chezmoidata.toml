monitor   = "DP-3"

[[machines.emin-ultrabook.workspaces]]
workspace = "5"
monitor   = "DP-3"

[[machines.emin-ultrabook.workspaces]]
workspace = "6"
monitor   = "DP-3"

[[machines.emin-ultrabook.workspaces]]
workspace = "7"
monitor   = "eDP-1"

[[machines.emin-ultrabook.workspaces]]
workspace = "8"
monitor   = "eDP-1"

[[machines.emin-ultrabook.workspaces]]
workspace = "9"
monitor   = "eDP-1"

# =============================================================================
