mode     = "3840x2160@60"
position = "0x0"
scale    = 1.50

[[machines.emin-ultrabook.monitors]]
output   = "eDP-1"
mode     = "1920x1200@60"
position = "324x1440"
scale    = 1

[[machines.emin-ultrabook.workspaces]]
workspace = "1"
monitor   = "eDP-1"

[[machines.emin-ultrabook.workspaces]]
workspace = "2"
monitor   = "DP-3"

[[machines.emin-ultrabook.workspaces]]
workspace = "3"
monitor   = "eDP-1"

[[machines.emin-ultrabook.workspaces]]
