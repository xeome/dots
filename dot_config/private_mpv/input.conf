# Navigation
LEFT seek -5
RIGHT seek +5
Shift+LEFT seek -1
Shift+RIGHT seek +1
Shift+UP hr-seek +1
Shift+DOWN hr-seek -1

# Playback
Space cycle pause
q quit
Enter cycle pause

# Volume
UP add volume 5
DOWN add volume -5
m cycle mute

# Mouse
MBTN_DBL_DOWN cycle fullscreen
WHEEL_UP add volume 5
WHEEL_DOWN add volume -5
WHEEL_LEFT seek -5
WHEEL_RIGHT seek +5

# Audio/Subtitle
j cycle sub
J cycle sub down
k cycle audio
K cycle audio down
z add sub-delay -0.1
Z add sub-delay +0.1
Ctrl+z add audio-delay -0.1
Ctrl+Z add audio-delay +0.1
r add sub-pos -1
t add sub-pos +1

# Video
f cycle fullscreen
T cycle ontop
a cycle aspect

# Frame step
. seek +1
, seek -1

# Skip chapters
[ seek -10
] seek +10

# Speed
< add speed -0.25
> add speed +0.25
Backspace set speed 1.0

# Screenshots
s screenshot
S screenshot video

# OSD
p script-binding modernf/visibility
o show-progress

